<svg xmlns="http://www.w3.org/2000/svg" width="130" height="20" role="img" aria-label="#StandWithLebanon">
  <title>#StandWithLebanon</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r">
    <rect width="130" height="20" rx="3" fill="#fff"/>
  </clipPath>
  <g clip-path="url(#r)">
    <rect width="0" height="20" fill="#555"/>
    <rect x="0" width="99" height="20" fill="#555"/>
    <!-- Iranian flag horizontal stripes (narrower) -->
    <rect x="99" y="0" width="31" height="4.66" fill="#ED1C24"/> <!-- Red -->
    <rect x="99" y="6.66" width="31" height="6.66" fill="#FFFFFF"/> <!-- White -->
    <rect x="99" y="15.33" width="31" height="4.67" fill="#ED1C24"/> <!-- Red -->
    <!-- Simplified emblem -->
    <text x="115" y="14"
      font-family="Arial"
      font-size="10"
      font-weight="700"
      fill="#00A651"
      text-anchor="middle">𖠰</text>
    <rect width="130" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
    <text aria-hidden="true" x="495" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="890">#StandWithLebanon</text>
    <text x="495" y="140" transform="scale(.1)" fill="#fff" textLength="890">#StandWithLebanon</text>
  </g>
</svg>
