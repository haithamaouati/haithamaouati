<svg xmlns="http://www.w3.org/2000/svg" width="180" height="20" role="img" aria-label="One, two, three, viva l'Algérie !">
    <title>One, two, three, viva l'Algérie !</title>

    <linearGradient id="s" x2="0" y2="100%">
        <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
        <stop offset="1" stop-opacity=".1"/>
    </linearGradient>

    <clipPath id="r">
        <rect width="180" height="20" rx="3" fill="#fff"/>
    </clipPath>

    <g clip-path="url(#r)">
        <!-- left text background -->
        <rect width="150" height="20" fill="#555"/>

        <!-- right image area -->
        <rect x="150" width="30" height="20" fill="#555"/>

        <!-- image properly positioned -->
        <image href="data:image/png;base64,"
              x="150" y="0" width="30" height="20"/>
    </g>

    <!-- centered text block -->
    <text x="75" y="13"
          fill="#fff"
          font-family="Verdana,Geneva,DejaVu Sans,sans-serif"
          font-size="10"
          text-anchor="middle">
        One, two, three, viva l'Algérie !
    </text>
</svg>